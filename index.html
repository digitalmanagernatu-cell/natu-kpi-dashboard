<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natu Laboratories — KPI Dashboard</title>

  <!-- Google Fonts: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <style>
    /* ── Brand palette ─────────────────────────────────────────────── */
    :root {
      --bg:        #f5f4f1;
      --bg2:       #ffffff;
      --bg3:       #f0efec;
      --border:    #e8e5e0;
      --text:      #2a2825;
      --text-dim:  #6b6660;
      --text-mut:  #a09890;

      /* Natu brand */
      --salmon:    #e2a29a;
      --salmon-60: #edcac7;
      --salmon-30: #f6e4e3;
      --peach:     #e4bca5;
      --peach-60:  #edd4c4;
      --peach-30:  #f6ece4;
      --sage:      #d3d7c4;
      --sage-60:   #e2e5d8;
      --sage-30:   #f0f2eb;
      --warm:      #dcd5be;
      --warm-60:   #e8e3d3;
      --warm-30:   #f3f0e8;

      --green:     #7aab8a;
      --red:       #d47070;
      --logo:      #4a4845;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #root { min-height:100vh; display:flex; flex-direction:column; }

    #js-error {
      display:none; position:fixed; inset:0; z-index:9999;
      background:#fff; color:#d47070;
      font-family:monospace; padding:40px;
      white-space:pre-wrap; overflow:auto;
    }

    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background: var(--bg3); }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius:4px; }

    @keyframes fadeUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes shimmer  { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .fade-up { animation: fadeUp .3s ease both; }
    .fade-in { animation: fadeIn .25s ease both; }

    /* ── App shell ─────────────────────────────────────────────────── */
    .app { flex:1; display:flex; flex-direction:column; }

    /* ── Header ────────────────────────────────────────────────────── */
    .hdr {
      position: sticky; top:0; z-index:200;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
    }
    .hdr-inner {
      max-width: 1440px; margin:0 auto;
      display: flex; align-items: center; gap:20px; height:64px;
    }

    /* Logo */
    .logo { display:flex; align-items:center; gap:11px; flex-shrink:0; text-decoration:none; }
    .logo-leaf { width:28px; flex-shrink:0; }
    .logo-wordmark { display:flex; flex-direction:column; line-height:1.2; }
    .logo-name { font-size:13px; font-weight:700; letter-spacing:.04em; color:var(--text); text-transform:uppercase; }
    .logo-sub  { font-size:9px;  font-weight:500; letter-spacing:.12em; color:var(--text-mut); text-transform:uppercase; }

    /* Market tabs */
    .mkt-tabs { display:flex; gap:4px; flex:1; }
    .mkt-tab {
      padding: 6px 20px;
      border-radius: 24px;
      border: 1.5px solid transparent;
      background: transparent;
      color: var(--text-dim);
      font-family: 'Montserrat', sans-serif;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      letter-spacing: .02em;
    }
    .mkt-tab:hover { background: var(--bg3); color: var(--text); }

    .hdr-actions { display:flex; gap:8px; flex-shrink:0; }
    .btn {
      display: inline-flex; align-items:center; gap:5px;
      padding: 7px 14px; border-radius:8px;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--text-dim);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all .18s;
      text-decoration:none; letter-spacing:.02em;
    }
    .btn:hover { background:var(--bg3); color:var(--text); }
    .btn:disabled { opacity:.4; cursor:not-allowed; pointer-events:none; }

    /* ── Main ──────────────────────────────────────────────────────── */
    .main { flex:1; padding:28px 32px; max-width:1440px; margin:0 auto; width:100%; }

    /* ── Month pills ───────────────────────────────────────────────── */
    .month-bar { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:26px; }
    .month-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-mut); flex-shrink:0; }
    .month-pill {
      padding: 4px 14px; border-radius:20px;
      border: 1.5px solid var(--border);
      background: transparent; color:var(--text-dim);
      font-family:'Montserrat',sans-serif; font-size:11px; font-weight:600;
      cursor:pointer; transition:all .16s; letter-spacing:.02em;
    }
    .month-pill:hover { border-color: #bbb; color:var(--text); }

    /* ── Section ───────────────────────────────────────────────────── */
    .section { margin-bottom:28px; }
    .sec-hdr  { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
    .sec-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim); white-space:nowrap; }
    .sec-rule  { flex:1; height:1px; background:var(--border); }
    .sec-sub   { font-size:10px; color:var(--text-mut); font-weight:500; }

    /* ── KPI Grid ──────────────────────────────────────────────────── */
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:12px; }

    .kpi-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 16px 14px;
      position: relative;
      overflow: hidden;
      transition: transform .18s, box-shadow .18s;
    }
    .kpi-card:hover { transform:translateY(-2px); box-shadow: 0 6px 22px rgba(0,0,0,.07); }

    .kpi-accent { position:absolute; top:0; left:0; right:0; height:3px; border-radius:12px 12px 0 0; }
    .kpi-bg     { position:absolute; bottom:-10px; right:-10px; width:60px; height:60px; border-radius:50%; opacity:.12; }

    .kpi-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-mut); margin-bottom:10px; }
    .kpi-value { font-size:26px; font-weight:700; line-height:1.1; margin-bottom:8px; letter-spacing:-.01em; }
    .kpi-footer { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
    .kpi-prev   { font-size:10px; color:var(--text-mut); font-weight:500; }

    .gbadge     { display:inline-flex; align-items:center; gap:2px; font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; }
    .gbadge-pos { background:rgba(122,171,138,.15); color:#5a9470; }
    .gbadge-neg { background:rgba(212,112,112,.13); color:#c05555; }
    .gbadge-neu { background:rgba(160,152,144,.12); color:var(--text-mut); }

    /* ── Chart card ────────────────────────────────────────────────── */
    .chart-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; }
    .chart-title { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--text-mut); margin-bottom:16px; }

    /* ── Grids ─────────────────────────────────────────────────────── */
    .two-col   { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }

    /* ── Funnel ────────────────────────────────────────────────────── */
    .funnel { display:flex; flex-direction:column; gap:8px; }
    .funnel-step {}
    .funnel-bar-wrap { background:var(--bg3); border-radius:8px; overflow:hidden; height:46px; position:relative; }
    .funnel-fill { height:100%; border-radius:8px; transition:width .7s cubic-bezier(.4,0,.2,1); min-width:6%; opacity:.85; }
    .funnel-lbl { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:11px; font-weight:700; color:var(--text); z-index:1; letter-spacing:.02em; }
    .funnel-val { position:absolute; right:13px; top:50%; transform:translateY(-50%); font-size:17px; font-weight:700; color:var(--text); z-index:1; }
    .funnel-rate { font-size:10px; color:var(--text-mut); margin-top:3px; padding-left:4px; font-weight:500; }

    /* ── Quality ───────────────────────────────────────────────────── */
    .qlty-rows { display:flex; flex-direction:column; gap:13px; }
    .qlty-row  { display:flex; align-items:center; gap:10px; }
    .qlty-lbl  { width:96px; font-size:11px; color:var(--text-dim); flex-shrink:0; font-weight:500; }
    .qlty-track { flex:1; background:var(--bg3); border-radius:5px; height:8px; overflow:hidden; }
    .qlty-fill  { height:100%; border-radius:5px; transition:width .7s cubic-bezier(.4,0,.2,1); }
    .qlty-num   { width:36px; text-align:right; flex-shrink:0; font-size:13px; font-weight:700; }

    /* ── Campaign table ────────────────────────────────────────────── */
    .camp-tbl { width:100%; border-collapse:collapse; }
    .camp-tbl th { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--text-mut); padding:7px 12px; text-align:left; border-bottom:1.5px solid var(--border); }
    .camp-tbl td { padding:10px 12px; font-size:12px; border-bottom:1px solid var(--bg3); transition:background .1s; }
    .camp-tbl tr:last-child td { border-bottom:none; }
    .camp-tbl tbody tr:hover td { background:var(--bg3); }
    .camp-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:7px; vertical-align:middle; }
    .nf { font-weight:600; font-size:13px; }

    /* ── AI panel ──────────────────────────────────────────────────── */
    .ai-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:24px; }
    .ai-hdr  { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
    .ai-hdr-left  { display:flex; align-items:center; gap:9px; }
    .ai-hdr-title { font-size:13px; font-weight:700; letter-spacing:.02em; }
    .ai-badge { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; padding:2px 8px; border-radius:4px; }
    .ai-obs-list { display:flex; flex-direction:column; gap:10px; }
    .ai-obs { display:flex; gap:13px; background:var(--bg3); border-radius:8px; padding:13px 15px; }
    .ai-obs-n   { font-size:20px; font-weight:700; flex-shrink:0; line-height:1.3; opacity:.3; }
    .ai-obs-txt { font-size:12px; color:var(--text-dim); line-height:1.7; font-weight:400; }
    .ai-key-input {
      background:var(--bg3); border:1.5px solid var(--border); border-radius:8px;
      padding:7px 11px; color:var(--text); font-family:'Montserrat',sans-serif; font-size:12px;
      width:230px; outline:none; transition:border-color .2s; font-weight:500;
    }
    .ai-key-input:focus { border-color:#bbb; }
    .ai-key-input::placeholder { color:var(--text-mut); }

    /* ── Utility ───────────────────────────────────────────────────── */
    .spinner { width:15px; height:15px; border:2px solid var(--border); border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0; }
    .spinner-lg { width:34px; height:34px; border-width:3px; }

    .loading-page { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:80px; }
    .loading-txt  { font-size:12px; color:var(--text-mut); font-weight:500; letter-spacing:.04em; }

    .skeleton { background:linear-gradient(90deg,var(--bg3) 25%,#ebe9e5 50%,var(--bg3) 75%); background-size:200% 100%; animation:shimmer 1.4s ease infinite; border-radius:8px; }

    .empty   { padding:36px; text-align:center; color:var(--text-mut); font-size:12px; font-weight:500; }
    .err-page { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:60px; text-align:center; }
    .err-msg  { font-weight:700; font-size:14px; color:var(--red); }
    .err-sub  { font-size:12px; color:var(--text-mut); max-width:420px; }

    /* ── Tooltip ───────────────────────────────────────────────────── */
    .ctt { background:#fff; border:1px solid var(--border); border-radius:8px; padding:10px 13px; font-size:11px; box-shadow:0 4px 16px rgba(0,0,0,.08); }
    .ctt-label { color:var(--text); font-weight:700; margin-bottom:5px; letter-spacing:.02em; }
    .ctt-row   { display:flex; align-items:center; gap:7px; color:var(--text-dim); margin-top:3px; }
    .ctt-dot   { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── Footer ────────────────────────────────────────────────────── */
    .footer { border-top:1px solid var(--border); padding:14px 32px; text-align:center; color:var(--text-mut); font-size:10px; letter-spacing:.08em; font-weight:500; background:#fff; }

    /* ── Print ─────────────────────────────────────────────────────── */
    @media print {
      .hdr { position:relative; backdrop-filter:none; }
      .hdr-actions, .btn, .month-bar, .ai-card button, .ai-key-input { display:none!important; }
      body { background:#fff; }
      .kpi-card, .chart-card, .ai-card { box-shadow:none!important; }
      .section { break-inside:avoid; }
    }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media(max-width:980px) {
      .hdr { padding:0 16px; } .main { padding:16px; }
      .hdr-inner { flex-wrap:wrap; height:auto; padding:10px 0; gap:8px; }
      .two-col, .three-col { grid-template-columns:1fr; }
    }
    @media(max-width:600px) {
      .kpi-grid { grid-template-columns:repeat(2,1fr); }
      .mkt-tab  { padding:5px 12px; font-size:11px; }
    }
  </style>
</head>

<div id="js-error"></div>
<div id="root"></div>

<script>
  window.addEventListener('error', function(e) {
    var el = document.getElementById('js-error');
    if (el) {
      el.style.display = 'block';
      el.textContent = 'ERROR JS:\n\n' + (e.message||e) + '\n' + (e.filename||'') + ':' + (e.lineno||'');
    }
  });
</script>

<script type="text/babel" data-presets="react">
if (typeof React === 'undefined')    throw new Error('React CDN failed');
if (typeof ReactDOM === 'undefined') throw new Error('ReactDOM CDN failed');

const RC = (typeof Recharts !== 'undefined') ? Recharts : null;
const { useState, useEffect, useCallback, useMemo, useRef, Component } = React;

/* Recharts (safe) */
const LineChart          = RC ? RC.LineChart          : () => null;
const Line               = RC ? RC.Line               : () => null;
const BarChart           = RC ? RC.BarChart            : () => null;
const Bar                = RC ? RC.Bar                 : () => null;
const XAxis              = RC ? RC.XAxis               : () => null;
const YAxis              = RC ? RC.YAxis               : () => null;
const CartesianGrid      = RC ? RC.CartesianGrid       : () => null;
const Tooltip            = RC ? RC.Tooltip             : () => null;
const Legend             = RC ? RC.Legend              : () => null;
const ResponsiveContainer = RC ? RC.ResponsiveContainer : ({children,height}) =>
  React.createElement('div', { style:{width:'100%',height:height||200} }, children);

/* ── Data source ─────────────────────────────────────────────────────── */
const SHEET_ID = '10L-7Bygcdv0U0xmAqoL2_6_ialN144xbsR9MBa58Xnw';

/* Brand palette per market */
const MARKETS = [
  { id:'es', label:'España',  sheet:'kpis ESPAÑA',  color:'#e2a29a', color60:'#edcac7', color30:'#f6e4e3' },
  { id:'it', label:'Italia',  sheet:'kpis ITALIA',  color:'#e4bca5', color60:'#edd4c4', color30:'#f6ece4' },
  { id:'fr', label:'Francia', sheet:'kpis FRANCIA', color:'#d3d7c4', color60:'#e2e5d8', color30:'#f0f2eb' },
  { id:'ro', label:'Rumanía', sheet:'kpis RUMANIA', color:'#dcd5be', color60:'#e8e3d3', color30:'#f3f0e8' },
];

const CACHE = new Map();

/* ── Formatters ──────────────────────────────────────────────────────── */
const fmt = {
  num: v => v == null ? '—' : Number(v).toLocaleString('es-ES'),
  pct: v => v == null ? '—' : (Number(v)*100).toFixed(1)+'%',
  eur: v => v == null ? '—' : '€'+Number(v).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}),
  dur: v => {
    if (v == null) return '—';
    const s=Math.round(Number(v)), m=Math.floor(s/60), r=s%60;
    return m+'m '+(r<10?'0':'')+r+'s';
  },
  n: v => v==null ? 0 : Number(v)||0,
};

function pctChange(cur,prv) {
  if (prv==null||prv===0||cur==null) return null;
  return ((cur-prv)/Math.abs(prv))*100;
}
function sheetUrl(name) {
  return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(name);
}

/* ── Parse ───────────────────────────────────────────────────────────── */
function parseGviz(raw) {
  const match = raw.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);\s*$/);
  if (!match) throw new Error('Respuesta gviz inesperada');
  const json = JSON.parse(match[1]);
  const rows = json.table ? json.table.rows||[] : [];
  return rows.map(function(row) {
    const c  = row.c||[];
    const v  = i => c[i] ? c[i].v : null;
    const f  = i => c[i] ? (c[i].f||(c[i].v!=null?String(c[i].v):null)) : null;
    const n  = i => { const x=c[i]?c[i].v:null; return x!=null?Number(x):null; };
    const mesRaw  = f(0)||v(0);
    if (!mesRaw) return null;
    const campaña = String(v(1)||'').trim();
    return {
      mes:String(mesRaw).trim(), campaña,
      isTotal: campaña.toUpperCase().includes('TOTAL'),
      sesiones:n(2),  usuarios:n(3),   eventos:n(4),
      tasaRebote:n(5), duracion:n(6),
      clicsAds:n(7),  ctr:n(8),        cpcMedio:n(9),
      inversion:n(10), conversiones:n(11), cpl:n(12),
      leadsTotales:n(13), infoEnviada:n(14), muestras:n(15),
      convertidos:n(16), interesadosPL:n(17),
      exploratorio:n(18), viable:n(19), caliente:n(20), noViable:n(21),
    };
  }).filter(Boolean);
}

function groupByMonth(rows) {
  const map = new Map();
  rows.forEach(function(r) {
    if (!map.has(r.mes)) map.set(r.mes,{total:null,campaigns:[]});
    const g = map.get(r.mes);
    if (r.isTotal) g.total = r; else if (r.campaña) g.campaigns.push(r);
  });
  return map;
}

/* ── useSheetData ────────────────────────────────────────────────────── */
function useSheetData(sheetName) {
  const [state, setState] = useState(function() {
    if (CACHE.has(sheetName)) return {data:CACHE.get(sheetName),loading:false,error:null};
    return {data:null,loading:true,error:null};
  });
  const abortRef = useRef(null);
  useEffect(function() {
    if (CACHE.has(sheetName)) {
      setState({data:CACHE.get(sheetName),loading:false,error:null}); return;
    }
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    setState({data:null,loading:true,error:null});
    fetch(sheetUrl(sheetName),{signal:abortRef.current.signal})
      .then(r => r.text())
      .then(txt => {
        const grouped = groupByMonth(parseGviz(txt));
        CACHE.set(sheetName, grouped);
        setState({data:grouped,loading:false,error:null});
      })
      .catch(err => {
        if (err.name!=='AbortError') setState({data:null,loading:false,error:err.message});
      });
    return function() { if (abortRef.current) abortRef.current.abort(); };
  }, [sheetName]);
  return state;
}

/* ── ErrorBoundary ───────────────────────────────────────────────────── */
class ErrorBoundary extends Component {
  constructor(p) { super(p); this.state={error:null}; }
  static getDerivedStateFromError(e) { return {error:e}; }
  render() {
    if (this.state.error) return (
      <div className="err-page">
        <div style={{fontSize:28,color:'var(--red)'}}>⚠</div>
        <div className="err-msg">Error en el componente</div>
        <div className="err-sub">{String(this.state.error)}</div>
      </div>
    );
    return this.props.children;
  }
}

/* ── Natu leaf SVG logo ──────────────────────────────────────────────── */
function NatuLogo({ size=32 }) {
  return (
    <svg width={size} viewBox="0 0 670 870" fill="none" xmlns="http://www.w3.org/2000/svg" className="logo-leaf">
      {/* Upper leaf */}
      <path
        d="M335 10 C335 10 100 80 80 280 C60 480 200 600 335 650
           C470 600 610 480 590 280 C570 80 335 10 335 10Z"
        fill="var(--logo)"
        opacity="1"
      />
      {/* Lower leaf */}
      <path
        d="M200 660 C200 660 100 700 110 780 C120 850 220 870 310 850
           C400 830 470 760 450 700 C430 640 200 660 200 660Z"
        fill="var(--logo)"
        opacity="1"
      />
    </svg>
  );
}

/* ── GrowthBadge ─────────────────────────────────────────────────────── */
function GrowthBadge({ current, previous, invert }) {
  const pct = pctChange(current, previous);
  if (pct === null) return null;
  const better = invert ? pct<0 : pct>0;
  const cls = better ? 'gbadge gbadge-pos' : pct<0 ? 'gbadge gbadge-neg' : 'gbadge gbadge-neu';
  const arrow = pct>0.05 ? '↑' : pct<-0.05 ? '↓' : '→';
  return <span className={cls}>{arrow} {Math.abs(pct).toFixed(1)}%</span>;
}

/* ── KPICard ─────────────────────────────────────────────────────────── */
function KPICard({ label, value, prev, format, invert, color, color30, delay }) {
  function fmtV(v) {
    if (v==null) return '—';
    if (format==='eur') return fmt.eur(v);
    if (format==='pct') return fmt.pct(v);
    if (format==='dur') return fmt.dur(v);
    return fmt.num(v);
  }
  return (
    <div className="kpi-card fade-up" style={{ animationDelay:(delay||0)+'ms' }}>
      <div className="kpi-accent" style={{ background: color }} />
      <div className="kpi-bg"     style={{ background: color }} />
      <div className="kpi-label">{label}</div>
      <div className="kpi-value"  style={{ color }}>{fmtV(value)}</div>
      <div className="kpi-footer">
        <GrowthBadge current={value} previous={prev} invert={invert} />
        {prev!=null && <span className="kpi-prev">ant. {fmtV(prev)}</span>}
      </div>
    </div>
  );
}

/* ── ConversionFunnel ────────────────────────────────────────────────── */
function ConversionFunnel({ data, color, color60, color30 }) {
  if (!data) return <div className="empty">Sin datos de conversión</div>;
  const steps = [
    { label:'Leads Totales', value:data.leadsTotales },
    { label:'Info Enviada',  value:data.infoEnviada  },
    { label:'Muestras',      value:data.muestras     },
    { label:'Convertidos',   value:data.convertidos  },
  ];
  const base = Math.max(fmt.n(steps[0].value), 1);
  const fills = [color, color60, color30, '#f0efec'];

  return (
    <div className="funnel">
      {steps.map(function(s, i) {
        const val   = fmt.n(s.value);
        const width = Math.max(8, (val/base)*100);
        const rate  = i>0 ? (val/base*100).toFixed(1) : null;
        return (
          <div key={i} className="funnel-step fade-up" style={{ animationDelay:(i*60)+'ms' }}>
            <div className="funnel-bar-wrap">
              <div className="funnel-fill" style={{ width:width+'%', background:fills[i] }} />
              <span className="funnel-lbl">{s.label}</span>
              <span className="funnel-val">{fmt.num(s.value)}</span>
            </div>
            {rate!==null && <div className="funnel-rate">{rate}% sobre leads totales</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ── LeadQuality ─────────────────────────────────────────────────────── */
function LeadQuality({ data, color }) {
  if (!data) return <div className="empty">Sin datos</div>;
  const items = [
    { label:'Caliente',     value:data.caliente,     fill:'#d47070' },
    { label:'Viable',       value:data.viable,       fill:'#7aab8a' },
    { label:'Exploratorio', value:data.exploratorio, fill:color     },
    { label:'No viable',    value:data.noViable,     fill:'#c8c0b5' },
  ];
  const max = Math.max.apply(null, items.map(i => fmt.n(i.value)).concat([1]));
  return (
    <div className="qlty-rows">
      {items.map(function(it) {
        return (
          <div key={it.label} className="qlty-row">
            <div className="qlty-lbl">{it.label}</div>
            <div className="qlty-track">
              <div className="qlty-fill" style={{ width:(fmt.n(it.value)/max*100)+'%', background:it.fill }} />
            </div>
            <div className="qlty-num" style={{ color:it.fill }}>{fmt.num(it.value)}</div>
          </div>
        );
      })}
    </div>
  );
}

/* ── CampaignBreakdown ───────────────────────────────────────────────── */
function CampaignBreakdown({ campaigns, color }) {
  if (!campaigns||!campaigns.length)
    return <div className="empty">No hay datos de campaña para este mes</div>;
  const totInv   = campaigns.reduce((s,c) => s+fmt.n(c.inversion),0);
  const totClics = campaigns.reduce((s,c) => s+fmt.n(c.clicsAds),0);
  return (
    <div style={{ overflowX:'auto' }}>
      <table className="camp-tbl">
        <thead>
          <tr><th>Campaña</th><th>Clics</th><th>CTR</th><th>CPC</th><th>Inversión</th><th>Conv.</th><th>CPL</th></tr>
        </thead>
        <tbody>
          {campaigns.map(function(c,i) {
            return (
              <tr key={i}>
                <td><span className="camp-dot" style={{ background:color }}/>{c.campaña}</td>
                <td className="nf">{fmt.num(c.clicsAds)}</td>
                <td className="nf">{fmt.pct(c.ctr)}</td>
                <td className="nf">{fmt.eur(c.cpcMedio)}</td>
                <td className="nf" style={{ color, fontWeight:700 }}>{fmt.eur(c.inversion)}</td>
                <td className="nf">{fmt.num(c.conversiones)}</td>
                <td className="nf">{fmt.eur(c.cpl)}</td>
              </tr>
            );
          })}
          {campaigns.length>1 && (
            <tr style={{ borderTop:'1.5px solid var(--border)' }}>
              <td style={{ fontSize:10,fontWeight:700,letterSpacing:'.08em',color:'var(--text-mut)',textTransform:'uppercase' }}>TOTAL</td>
              <td className="nf" style={{ fontWeight:700 }}>{fmt.num(totClics)}</td>
              <td>—</td><td>—</td>
              <td className="nf" style={{ color,fontWeight:700 }}>{fmt.eur(totInv)}</td>
              <td>—</td><td>—</td>
            </tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

/* ── CustomTooltip ───────────────────────────────────────────────────── */
function ChartTooltip({ active, payload, label }) {
  if (!active||!payload||!payload.length) return null;
  return (
    <div className="ctt">
      <div className="ctt-label">{label}</div>
      {payload.map(function(p,i) {
        return (
          <div key={i} className="ctt-row">
            <div className="ctt-dot" style={{ background:p.color }} />
            <span>{p.name}:</span>
            <span style={{ color:'var(--text)',fontWeight:700 }}>
              {p.name==='Inversión' ? fmt.eur(p.value) : fmt.num(p.value)}
            </span>
          </div>
        );
      })}
    </div>
  );
}

/* ── HistoryCharts ───────────────────────────────────────────────────── */
function HistoryCharts({ monthsData, months, color }) {
  const chartData = months.map(function(mes) {
    const g   = monthsData.get(mes);
    const tot = g ? g.total : null;
    const inv = (g ? g.campaigns : []).reduce((s,c) => s+fmt.n(c.inversion),0) || fmt.n(tot?tot.inversion:null);
    return {
      mes:  mes.length>9 ? mes.slice(0,3) : mes,
      Leads:       fmt.n(tot?tot.leadsTotales:null),
      Convertidos: fmt.n(tot?tot.convertidos:null),
      'Inversión': inv,
    };
  });
  const axis = { fill:'#a09890', fontSize:10, fontFamily:'Montserrat,sans-serif', fontWeight:600 };
  return (
    <div className="two-col">
      <div className="chart-card">
        <div className="chart-title">Evolución Leads &amp; Convertidos</div>
        <ResponsiveContainer width="100%" height={200}>
          <LineChart data={chartData} margin={{ top:4,right:12,bottom:0,left:-10 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
            <XAxis dataKey="mes" tick={axis} axisLine={false} tickLine={false} />
            <YAxis tick={axis} axisLine={false} tickLine={false} />
            <Tooltip content={<ChartTooltip />} />
            <Legend iconType="circle" iconSize={7} wrapperStyle={{ fontSize:11,color:'var(--text-dim)',fontFamily:'Montserrat,sans-serif' }} />
            <Line type="monotone" dataKey="Leads"       stroke={color}     strokeWidth={2.5} dot={{ r:4,fill:color,strokeWidth:0 }}     activeDot={{ r:6 }} />
            <Line type="monotone" dataKey="Convertidos" stroke="#7aab8a"   strokeWidth={2.5} dot={{ r:4,fill:'#7aab8a',strokeWidth:0 }} activeDot={{ r:6 }} />
          </LineChart>
        </ResponsiveContainer>
      </div>
      <div className="chart-card">
        <div className="chart-title">Inversión en Ads (€)</div>
        <ResponsiveContainer width="100%" height={200}>
          <BarChart data={chartData} margin={{ top:4,right:12,bottom:0,left:-10 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
            <XAxis dataKey="mes" tick={axis} axisLine={false} tickLine={false} />
            <YAxis tick={axis} axisLine={false} tickLine={false} />
            <Tooltip content={<ChartTooltip />} />
            <Bar dataKey="Inversión" fill={color} radius={[6,6,0,0]} maxBarSize={50} />
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

/* ── AIAnalysis ──────────────────────────────────────────────────────── */
function AIAnalysis({ monthsData, month, marketLabel, color, color30 }) {
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const [apiKey,  setApiKey]  = useState('');
  const abortRef = useRef(null);

  function buildPrompt() {
    if (!monthsData||!month) return '';
    const g  = monthsData.get(month);
    const t  = g ? g.total : null;
    const cs = g ? g.campaigns : [];
    const camp = cs.length
      ? '\nCAMPAÑAS:\n'+cs.map(c =>
          '  • '+c.campaña+': '+fmt.num(c.clicsAds)+' clics, CTR '+fmt.pct(c.ctr)+
          ', inversión '+fmt.eur(c.inversion)+', CPL '+fmt.eur(c.cpl)
        ).join('\n')
      : '';
    return 'Eres analista de marketing digital para Natu Laboratories (sector farmacéutico).\n'+
      'Analiza los KPIs del mercado '+marketLabel+' en '+month+' y genera 3-4 observaciones accionables en español.\n'+
      'Usa datos concretos. Evita frases genéricas.\n\nDATOS:\n'+
      '— Sesiones: '+fmt.num(t?t.sesiones:null)+' | Usuarios: '+fmt.num(t?t.usuarios:null)+
      ' | Rebote: '+fmt.pct(t?t.tasaRebote:null)+' | Duración: '+fmt.dur(t?t.duracion:null)+'\n'+
      '— Leads: '+fmt.num(t?t.leadsTotales:null)+' | Info: '+fmt.num(t?t.infoEnviada:null)+
      ' | Muestras: '+fmt.num(t?t.muestras:null)+' | Convertidos: '+fmt.num(t?t.convertidos:null)+'\n'+
      '— Caliente: '+fmt.num(t?t.caliente:null)+' | Viable: '+fmt.num(t?t.viable:null)+
      ' | Exploratorio: '+fmt.num(t?t.exploratorio:null)+' | No viable: '+fmt.num(t?t.noViable:null)+
      camp+'\n\nResponde SOLO con observaciones numeradas (1. 2. 3. …).';
  }

  async function run() {
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    setLoading(true); setError(null); setResult(null);
    try {
      const headers = { 'Content-Type':'application/json','anthropic-version':'2023-06-01' };
      if (apiKey.trim()) headers['x-api-key'] = apiKey.trim();
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers,
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:700,
          messages:[{ role:'user', content:buildPrompt() }],
        }),
        signal: abortRef.current.signal,
      });
      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        throw new Error((err.error&&err.error.message)||'HTTP '+res.status);
      }
      const data = await res.json();
      const text = (data.content&&data.content[0]&&data.content[0].text)||'';
      const obs  = text.split(/\n(?=\d+[\.\-]\s)/)
        .map(s => s.replace(/^\d+[\.\-]\s*/,'').trim()).filter(Boolean);
      setResult(obs);
    } catch(err) {
      if (err.name!=='AbortError') setError(err.message);
    } finally { setLoading(false); }
  }

  return (
    <div className="ai-card">
      <div className="ai-hdr">
        <div className="ai-hdr-left">
          <span style={{ fontSize:15 }}>✦</span>
          <span className="ai-hdr-title">Análisis con IA</span>
          <span className="ai-badge" style={{ background:color30, color }}>Claude</span>
        </div>
        <div style={{ display:'flex',gap:8,alignItems:'center',flexWrap:'wrap' }}>
          <input
            className="ai-key-input"
            type="password"
            placeholder="API key Anthropic (opcional)"
            value={apiKey}
            onChange={e => setApiKey(e.target.value)}
          />
          <button
            className="btn"
            style={!loading&&month ? { borderColor:color,color } : {}}
            onClick={run}
            disabled={loading||!month}
          >
            {loading ? <><span className="spinner" style={{ borderTopColor:color }}/> Analizando…</> : '▶ Generar análisis'}
          </button>
        </div>
      </div>

      {error && (
        <div style={{ padding:'11px 13px',borderRadius:8,marginBottom:12,background:'#fdf0f0',color:'#c05555',fontSize:12,fontWeight:500 }}>
          ⚠ {error}
        </div>
      )}
      {loading && !result && (
        <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
          {[0,1,2].map(i => <div key={i} className="skeleton" style={{ height:56,animationDelay:(i*.12)+'s' }}/>)}
        </div>
      )}
      {result && (
        <div className="ai-obs-list fade-in">
          {result.map(function(obs,i) {
            return (
              <div key={i} className="ai-obs" style={{ borderLeft:'3px solid '+color }}>
                <div className="ai-obs-n" style={{ color }}>{i+1}</div>
                <div className="ai-obs-txt">{obs}</div>
              </div>
            );
          })}
        </div>
      )}
      {!loading&&!result&&!error && (
        <div className="empty" style={{ padding:'12px 0 0' }}>
          Pulsa "Generar análisis" para obtener observaciones sobre los KPIs del mes seleccionado.
        </div>
      )}
    </div>
  );
}

/* ── MarketDashboard ─────────────────────────────────────────────────── */
function MarketDashboard({ market }) {
  const { data, loading, error } = useSheetData(market.sheet);
  const months    = useMemo(() => data ? Array.from(data.keys()) : [], [data]);
  const [selMonth, setSelMonth] = useState(null);

  useEffect(function() {
    if (months.length) setSelMonth(months[months.length-1]);
  }, [months]);

  const curGroup  = useMemo(() => (data&&selMonth) ? data.get(selMonth)  : null, [data,selMonth]);
  const prevKey   = useMemo(() => {
    if (!months.length||!selMonth) return null;
    const i = months.indexOf(selMonth);
    return i>0 ? months[i-1] : null;
  }, [months,selMonth]);
  const prevGroup = useMemo(() => (data&&prevKey) ? data.get(prevKey) : null, [data,prevKey]);

  const cur  = curGroup  ? curGroup.total  : null;
  const prev = prevGroup ? prevGroup.total : null;
  const campaigns      = curGroup  ? curGroup.campaigns  : [];
  const prevCampaigns  = prevGroup ? prevGroup.campaigns : [];

  const totInv      = campaigns.reduce((s,c)     => s+fmt.n(c.inversion),0) || fmt.n(cur  ? cur.inversion  : null);
  const prevTotInv  = prevCampaigns.reduce((s,c) => s+fmt.n(c.inversion),0) || fmt.n(prev ? prev.inversion : null);
  const totClics    = campaigns.reduce((s,c)     => s+fmt.n(c.clicsAds),0)  || fmt.n(cur  ? cur.clicsAds  : null);
  const prevTotClics= prevCampaigns.reduce((s,c) => s+fmt.n(c.clicsAds),0)  || fmt.n(prev ? prev.clicsAds : null);

  const c   = market.color;
  const c60 = market.color60;
  const c30 = market.color30;

  if (loading) return (
    <div className="loading-page">
      <div className="spinner spinner-lg" style={{ borderTopColor:c }} />
      <div className="loading-txt">Cargando {market.label}…</div>
    </div>
  );
  if (error) return (
    <div className="err-page">
      <div style={{ fontSize:26,color:'var(--red)' }}>⚠</div>
      <div className="err-msg">Error al cargar datos</div>
      <div className="err-sub">{error}</div>
    </div>
  );
  if (!data||!months.length) return (
    <div className="empty" style={{ paddingTop:60 }}>Sin datos en "{market.sheet}"</div>
  );

  return (
    <div>
      {/* Month bar */}
      <div className="month-bar">
        <span className="month-lbl">Período</span>
        {months.map(function(m) {
          const active = selMonth===m;
          return (
            <button
              key={m}
              className="month-pill"
              style={active ? { background:c,borderColor:c,color:'#fff',fontWeight:700 } : {}}
              onClick={() => setSelMonth(m)}
            >{m}</button>
          );
        })}
      </div>

      {/* Traffic */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Tráfico &amp; Comportamiento</div>
          <div className="sec-rule"/>
          {selMonth && <div className="sec-sub">{selMonth}</div>}
        </div>
        <div className="kpi-grid">
          <KPICard label="Sesiones"      value={cur?cur.sesiones   :null} prev={prev?prev.sesiones   :null} color={c} color30={c30} delay={0}   />
          <KPICard label="Usuarios"       value={cur?cur.usuarios    :null} prev={prev?prev.usuarios    :null} color={c} color30={c30} delay={60}  />
          <KPICard label="Tasa de Rebote" value={cur?cur.tasaRebote :null} prev={prev?prev.tasaRebote :null} color={c} color30={c30} delay={120} format="pct" invert={true} />
          <KPICard label="Duración Media" value={cur?cur.duracion   :null} prev={prev?prev.duracion   :null} color={c} color30={c30} delay={180} format="dur" />
        </div>
      </div>

      {/* Leads */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Leads &amp; Conversión</div>
          <div className="sec-rule"/>
        </div>
        <div className="kpi-grid">
          <KPICard label="Leads Totales"  value={cur?cur.leadsTotales :null} prev={prev?prev.leadsTotales :null} color={c} color30={c30} delay={0}   />
          <KPICard label="Info Enviada"    value={cur?cur.infoEnviada  :null} prev={prev?prev.infoEnviada  :null} color={c} color30={c30} delay={60}  />
          <KPICard label="Muestras"        value={cur?cur.muestras     :null} prev={prev?prev.muestras     :null} color={c} color30={c30} delay={120} />
          <KPICard label="Convertidos"     value={cur?cur.convertidos  :null} prev={prev?prev.convertidos  :null} color={c} color30={c30} delay={180} />
          <KPICard label="Interesados PL"  value={cur?cur.interesadosPL:null} prev={prev?prev.interesadosPL:null} color={c} color30={c30} delay={240} />
        </div>
      </div>

      {/* Ads */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Inversión &amp; Ads</div>
          <div className="sec-rule"/>
        </div>
        <div className="kpi-grid">
          <KPICard label="Inversión Ads" value={totInv   ||null} prev={prevTotInv   ||null} color={c} color30={c30} delay={0}   format="eur" />
          <KPICard label="Clics Ads"     value={totClics ||null} prev={prevTotClics ||null} color={c} color30={c30} delay={60}  />
          <KPICard label="CPC Medio"     value={cur?cur.cpcMedio:null} prev={prev?prev.cpcMedio:null} color={c} color30={c30} delay={120} format="eur" invert={true} />
          <KPICard label="CPL"           value={cur?cur.cpl     :null} prev={prev?prev.cpl     :null} color={c} color30={c30} delay={180} format="eur" invert={true} />
        </div>
      </div>

      {/* Funnel + Quality */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Embudo de Conversión</div>
          <div className="sec-rule"/>
        </div>
        <div className="two-col" style={{ alignItems:'start' }}>
          <ConversionFunnel data={cur} color={c} color60={c60} color30={c30} />
          <div className="chart-card">
            <div className="chart-title">Calidad de Leads</div>
            <LeadQuality data={cur} color={c} />
          </div>
        </div>
      </div>

      {/* Historical */}
      {months.length>1 && (
        <div className="section">
          <div className="sec-hdr">
            <div className="sec-title">Evolución Histórica</div>
            <div className="sec-rule"/>
          </div>
          <HistoryCharts monthsData={data} months={months} color={c} />
        </div>
      )}

      {/* Campaigns */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Desglose por Campaña</div>
          <div className="sec-rule"/>
        </div>
        <div className="chart-card">
          <CampaignBreakdown campaigns={campaigns} color={c} />
        </div>
      </div>

      {/* AI */}
      <div className="section">
        <AIAnalysis monthsData={data} month={selMonth} marketLabel={market.label} color={c} color30={c30} />
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────────────────────────────── */

  const [active, setActive] = useState('es');
  const market = MARKETS.find(m => m.id===active);

  return (
    <div className="app">
      {/* Header */}
      <header className="hdr">
        <div className="hdr-inner">
          {/* Logo */}
          <a className="logo" href="#">
            <NatuLogo size={28} />
            <div className="logo-wordmark">
              <span className="logo-name">Natu Laboratories</span>
              <span className="logo-sub">KPI Dashboard</span>
            </div>
          </a>

          {/* Market tabs */}
          <nav className="mkt-tabs">
            {MARKETS.map(function(m) {
              const isActive = active===m.id;
              return (
                <button
                  key={m.id}
                  className="mkt-tab"
                  style={isActive
                    ? { background:m.color30, borderColor:m.color, color:m.color }
                    : {}}
                  onClick={() => setActive(m.id)}
                >{m.label}</button>
              );
            })}
          </nav>

          <div className="hdr-actions">
            <button className="btn" onClick={() => window.print()}>⎙ PDF</button>

      {/* Main content */}
      <main className="main">
        <ErrorBoundary key={active}>
          <div className="fade-in">
            <MarketDashboard market={market} />
          </div>
        </ErrorBoundary>
      </main>

      <footer className="footer">
        Natu Laboratories · KPI Dashboard · {new Date().getFullYear()}
      </footer>
    </div>
  );
}

/* ── Mount ───────────────────────────────────────────────────────────── */

    React.createElement(ErrorBoundary, null, React.createElement(App, null))
  );
} catch(e) {
  const el = document.getElementById('js-error');
  if (el) { el.style.display='block'; el.textContent='Error al montar React:\n\n'+e; }
}
</script>
