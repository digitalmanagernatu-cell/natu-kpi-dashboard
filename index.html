<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natu Laboratories — KPI Dashboard</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- React 18 (pinned) -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Recharts: needs prop-types + d3 subset bundled; use known-good CDN via esm.sh shim -->
  <!-- We load recharts via a compatibility-tested version -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.4/umd/Recharts.js"></script>

  <!-- Babel standalone (pinned stable) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <style>
    :root {
      --bg:       #0a0a0f;
      --bg2:      #111118;
      --bg3:      #1a1a26;
      --bg4:      #22222f;
      --border:   rgba(201,168,76,.10);
      --border-h: rgba(201,168,76,.28);
      --gold:     #c9a84c;
      --gold-dim: rgba(201,168,76,.55);
      --gold-bg:  rgba(201,168,76,.08);
      --text:     #eaeaf4;
      --text-dim: #9898b2;
      --text-mut: #6b6b84;
      --green:    #4caf85;
      --red:      #e05a5a;
      --blue:     #4a90d9;
      --orange:   #e07a3a;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.6;
      min-height:100vh; -webkit-font-smoothing:antialiased;
    }
    #root { min-height:100vh; display:flex; flex-direction:column; }

    /* fallback error box shown if React crashes before mounting */
    #js-error {
      display:none; position:fixed; inset:0; z-index:9999;
      background:#0a0a0f; color:#e05a5a;
      font-family:monospace; padding:40px;
      white-space:pre-wrap; overflow:auto;
    }

    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:var(--bg2)}
    ::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:4px}

    @keyframes fadeUp  {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes fadeIn  {from{opacity:0}to{opacity:1}}
    @keyframes spin    {to{transform:rotate(360deg)}}
    @keyframes shimmer {0%{background-position:200% 0}100%{background-position:-200% 0}}

    .fade-up {animation:fadeUp .35s ease both}
    .fade-in {animation:fadeIn .25s ease both}

    /* Layout */
    .app{flex:1;display:flex;flex-direction:column}

    /* Header */
    .hdr{
      position:sticky;top:0;z-index:200;
      background:rgba(10,10,15,.92);backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);padding:0 32px;
    }
    .hdr-inner{
      max-width:1440px;margin:0 auto;
      display:flex;align-items:center;gap:24px;height:60px;
    }
    .logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .logo-mark{
      width:32px;height:32px;background:var(--gold-bg);
      border:1px solid var(--gold);border-radius:7px;
      display:flex;align-items:center;justify-content:center;
      font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--gold);
    }
    .logo-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--text)}
    .logo-sub{display:block;font-size:10px;color:var(--text-mut);text-transform:uppercase;letter-spacing:.1em}

    .mkt-tabs{display:flex;gap:3px;flex:1}
    .mkt-tab{
      padding:5px 18px;border-radius:7px;border:1px solid transparent;
      background:transparent;color:var(--text-mut);
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
      cursor:pointer;transition:all .2s;white-space:nowrap;
    }
    .mkt-tab:hover{background:var(--bg3);color:var(--text)}

    .hdr-actions{display:flex;gap:8px;flex-shrink:0}
    .btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 14px;border-radius:7px;border:1px solid var(--border);
      background:transparent;color:var(--text-mut);
      font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
      cursor:pointer;transition:all .2s;text-decoration:none;
    }
    .btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border-h)}
    .btn-gold{border-color:var(--gold);color:var(--gold)}
    .btn-gold:hover{background:var(--gold-bg)}
    .btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

    /* Main */
    .main{flex:1;padding:26px 32px;max-width:1440px;margin:0 auto;width:100%}

    /* Month pills */
    .month-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:24px}
    .month-lbl{font-size:10px;color:var(--text-mut);text-transform:uppercase;letter-spacing:.09em;flex-shrink:0}
    .month-pill{
      padding:4px 14px;border-radius:20px;border:1px solid var(--border);
      background:transparent;color:var(--text-mut);
      font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
      cursor:pointer;transition:all .18s;
    }
    .month-pill:hover{border-color:var(--border-h);color:var(--text)}

    /* Sections */
    .section{margin-bottom:28px}
    .sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .sec-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--text);white-space:nowrap}
    .sec-rule{flex:1;height:1px;background:var(--border)}
    .sec-sub{font-size:11px;color:var(--text-mut)}

    /* KPI grid */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:13px}
    .kpi-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:11px;
      padding:18px 16px 14px;position:relative;overflow:hidden;
      transition:transform .2s,box-shadow .2s,border-color .2s;
    }
    .kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4);border-color:var(--border-h)}
    .kpi-accent{position:absolute;top:0;left:0;right:0;height:2px;border-radius:11px 11px 0 0}
    .kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--text-mut);margin-bottom:9px}
    .kpi-value{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.1;margin-bottom:7px}
    .kpi-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .kpi-prev{font-size:11px;color:var(--text-mut)}

    .gbadge{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px}
    .gbadge-pos{background:rgba(76,175,133,.14);color:#4caf85}
    .gbadge-neg{background:rgba(224,90,90,.14);color:#e05a5a}
    .gbadge-neu{background:rgba(107,107,132,.12);color:var(--text-mut)}

    /* Chart card */
    .chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:20px}
    .chart-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:16px}

    /* Grids */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

    /* Funnel */
    .funnel{display:flex;flex-direction:column;gap:9px}
    .funnel-bar-wrap{background:var(--bg3);border-radius:7px;overflow:hidden;height:44px;position:relative}
    .funnel-fill{height:100%;border-radius:7px;transition:width .7s cubic-bezier(.4,0,.2,1);min-width:5%}
    .funnel-lbl{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:600;color:rgba(255,255,255,.85);z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.5)}
    .funnel-val{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.5)}
    .funnel-rate{font-size:11px;color:var(--text-mut);margin-top:3px;padding-left:4px}

    /* Quality */
    .qlty-rows{display:flex;flex-direction:column;gap:12px}
    .qlty-row{display:flex;align-items:center;gap:11px}
    .qlty-lbl{width:92px;font-size:12px;color:var(--text-mut);flex-shrink:0}
    .qlty-track{flex:1;background:var(--bg3);border-radius:4px;height:7px;overflow:hidden}
    .qlty-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}
    .qlty-num{width:38px;text-align:right;flex-shrink:0;font-family:'Playfair Display',serif;font-size:14px;font-weight:600}

    /* Campaign table */
    .camp-tbl{width:100%;border-collapse:collapse}
    .camp-tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-mut);padding:7px 11px;text-align:left;border-bottom:1px solid var(--border)}
    .camp-tbl td{padding:9px 11px;font-size:13px;border-bottom:1px solid rgba(201,168,76,.04);transition:background .12s}
    .camp-tbl tr:last-child td{border-bottom:none}
    .camp-tbl tbody tr:hover td{background:var(--bg3)}
    .camp-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
    .nf{font-family:'Playfair Display',serif;font-size:14px}

    /* AI */
    .ai-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:24px}
    .ai-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
    .ai-hdr-left{display:flex;align-items:center;gap:9px}
    .ai-hdr-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600}
    .ai-badge{background:var(--gold-bg);border:1px solid rgba(201,168,76,.4);color:var(--gold);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:2px 7px;border-radius:4px}
    .ai-obs-list{display:flex;flex-direction:column;gap:10px}
    .ai-obs{display:flex;gap:13px;background:var(--bg3);border-radius:8px;padding:13px 15px;border-left:2px solid var(--gold)}
    .ai-obs-n{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--gold-dim);flex-shrink:0;line-height:1.3}
    .ai-obs-txt{font-size:13px;color:var(--text-dim);line-height:1.65}
    .ai-key-input{
      background:var(--bg3);border:1px solid var(--border);border-radius:7px;
      padding:6px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;
      width:240px;outline:none;transition:border-color .2s;
    }
    .ai-key-input:focus{border-color:var(--border-h)}
    .ai-key-input::placeholder{color:var(--text-mut)}

    /* Spinner / states */
    .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
    .spinner-lg{width:36px;height:36px;border-width:3px}

    .loading-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px}
    .loading-txt{font-size:13px;color:var(--text-mut)}

    .skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s ease infinite;border-radius:7px}

    .empty{padding:36px;text-align:center;color:var(--text-mut);font-size:13px}
    .err-page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px;text-align:center}
    .err-msg{font-weight:600;font-size:15px;color:var(--red)}
    .err-sub{font-size:13px;color:var(--text-mut);max-width:420px}

    /* Custom tooltip */
    .ctt{background:var(--bg3);border:1px solid var(--border-h);border-radius:8px;padding:10px 13px;font-size:12px}
    .ctt-label{color:var(--text);font-weight:600;margin-bottom:5px}
    .ctt-row{display:flex;align-items:center;gap:7px;color:var(--text-dim);margin-top:3px}
    .ctt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* Footer */
    .footer{border-top:1px solid var(--border);padding:13px 32px;text-align:center;color:var(--text-mut);font-size:10px;letter-spacing:.05em}

    /* Print */
    @media print{
      .hdr-actions,.btn,.month-bar,.ai-card button,.ai-key-input{display:none!important}
      .hdr{position:relative;backdrop-filter:none;background:white;border-color:#ddd}
      body{background:white;color:#111}
      .kpi-card,.chart-card,.ai-card{background:white!important;border-color:#ddd!important}
      .funnel-bar-wrap,.qlty-track{background:#f0f0f0!important}
      .ai-obs{background:#f8f8f8!important}
      .section{break-inside:avoid}
    }

    @media(max-width:960px){
      .hdr{padding:0 14px}.main{padding:16px 14px}
      .hdr-inner{flex-wrap:wrap;height:auto;padding:10px 0;gap:8px}
      .two-col,.three-col{grid-template-columns:1fr}
    }
    @media(max-width:600px){
      .kpi-grid{grid-template-columns:repeat(2,1fr)}
      .mkt-tab{padding:4px 10px;font-size:12px}
    }
  </style>
</head>
<body>

<!-- Visible fallback if JS crashes entirely -->
<div id="js-error"></div>
<div id="root"></div>

<script>
  // Show any uncaught error before React mounts
  window.addEventListener('error', function(e) {
    var el = document.getElementById('js-error');
    if (el) {
      el.style.display = 'block';
      el.textContent = 'ERROR DE JAVASCRIPT:\n\n' + (e.message || e) +
        '\n\nArchivo: ' + (e.filename || '?') + ':' + (e.lineno || '?') +
        '\n\nAbre DevTools (F12 → Consola) para más detalles.';
    }
  });
</script>

<script type="text/babel" data-presets="react">
/* ── Verificación de dependencias ─────────────────────────────────────── */
if (typeof React === 'undefined')    throw new Error('React no cargó desde CDN');
if (typeof ReactDOM === 'undefined') throw new Error('ReactDOM no cargó desde CDN');

const RC = (typeof Recharts !== 'undefined') ? Recharts : null;

/* ── Hooks ────────────────────────────────────────────────────────────── */
const { useState, useEffect, useCallback, useMemo, useRef, Component } = React;

/* ── Recharts components (safe fallbacks if CDN failed) ──────────────── */
const LineChart     = RC ? RC.LineChart     : () => React.createElement('div', null, 'Recharts no disponible');
const Line          = RC ? RC.Line          : () => null;
const BarChart      = RC ? RC.BarChart      : () => null;
const Bar           = RC ? RC.Bar           : () => null;
const XAxis         = RC ? RC.XAxis         : () => null;
const YAxis         = RC ? RC.YAxis         : () => null;
const CartesianGrid = RC ? RC.CartesianGrid : () => null;
const Tooltip       = RC ? RC.Tooltip       : () => null;
const Legend        = RC ? RC.Legend        : () => null;
const ResponsiveContainer = RC ? RC.ResponsiveContainer : ({ children }) => React.createElement('div', { style: { width:'100%', height: 200 } }, children);

/* ── Constants ───────────────────────────────────────────────────────── */
const SHEET_ID = '10L-7Bygcdv0U0xmAqoL2_6_ialN144xbsR9MBa58Xnw';

const MARKETS = [
  { id:'es', label:'España',  sheet:'kpis ESPAÑA',  color:'#c9a84c' },
  { id:'it', label:'Italia',  sheet:'kpis ITALIA',  color:'#4a90d9' },
  { id:'fr', label:'Francia', sheet:'kpis FRANCIA', color:'#4caf85' },
  { id:'ro', label:'Rumanía', sheet:'kpis RUMANIA', color:'#e07a3a' },
];

/* ── Cache (persists between tab switches) ───────────────────────────── */
const CACHE = new Map();

/* ── Formatters ──────────────────────────────────────────────────────── */
const fmt = {
  num:  v => v == null ? '—' : Number(v).toLocaleString('es-ES'),
  pct:  v => v == null ? '—' : (Number(v) * 100).toFixed(1) + '%',
  eur:  v => v == null ? '—' : '€' + Number(v).toLocaleString('es-ES', { minimumFractionDigits:2, maximumFractionDigits:2 }),
  dur:  v => {
    if (v == null) return '—';
    const s = Math.round(Number(v)), m = Math.floor(s / 60), r = s % 60;
    return m + 'm ' + (r < 10 ? '0' : '') + r + 's';
  },
  n: v => v == null ? 0 : Number(v) || 0,
};

function pctChange(cur, prv) {
  if (prv == null || prv === 0 || cur == null) return null;
  return ((cur - prv) / Math.abs(prv)) * 100;
}

function sheetUrl(name) {
  return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(name);
}

/* ── Data parsing ────────────────────────────────────────────────────── */
function parseGviz(raw) {
  const match = raw.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);\s*$/);
  if (!match) throw new Error('Respuesta gviz inesperada');
  const json = JSON.parse(match[1]);
  const rows = json.table ? json.table.rows || [] : [];
  return rows.map(function(row) {
    const c = row.c || [];
    const v = function(i) { return c[i] ? c[i].v : null; };
    const f = function(i) { return c[i] ? (c[i].f || (c[i].v != null ? String(c[i].v) : null)) : null; };
    const n = function(i) { const x = c[i] ? c[i].v : null; return x != null ? Number(x) : null; };
    const mesRaw = f(0) || v(0);
    if (!mesRaw) return null;
    const campaña = String(v(1) || '').trim();
    return {
      mes:          String(mesRaw).trim(),
      campaña:      campaña,
      isTotal:      campaña.toUpperCase().indexOf('TOTAL') >= 0,
      sesiones:     n(2),  usuarios:     n(3),  eventos:     n(4),
      tasaRebote:   n(5),  duracion:     n(6),
      clicsAds:     n(7),  ctr:          n(8),  cpcMedio:    n(9),
      inversion:    n(10), conversiones: n(11), cpl:         n(12),
      leadsTotales: n(13), infoEnviada:  n(14), muestras:    n(15),
      convertidos:  n(16), interesadosPL:n(17),
      exploratorio: n(18), viable:       n(19),
      caliente:     n(20), noViable:     n(21),
    };
  }).filter(Boolean);
}

function groupByMonth(rows) {
  const map = new Map();
  rows.forEach(function(r) {
    if (!map.has(r.mes)) map.set(r.mes, { total: null, campaigns: [] });
    const g = map.get(r.mes);
    if (r.isTotal) g.total = r;
    else if (r.campaña) g.campaigns.push(r);
  });
  return map;
}

/* ── useSheetData ─────────────────────────────────────────────────────── */
function useSheetData(sheetName) {
  const [state, setState] = useState(function() {
    if (CACHE.has(sheetName)) return { data: CACHE.get(sheetName), loading: false, error: null };
    return { data: null, loading: true, error: null };
  });
  const abortRef = useRef(null);

  useEffect(function() {
    if (CACHE.has(sheetName)) {
      setState({ data: CACHE.get(sheetName), loading: false, error: null });
      return;
    }
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    setState({ data: null, loading: true, error: null });

    fetch(sheetUrl(sheetName), { signal: abortRef.current.signal })
      .then(function(r) { return r.text(); })
      .then(function(txt) {
        const rows = parseGviz(txt);
        const grouped = groupByMonth(rows);
        CACHE.set(sheetName, grouped);
        setState({ data: grouped, loading: false, error: null });
      })
      .catch(function(err) {
        if (err.name !== 'AbortError')
          setState({ data: null, loading: false, error: err.message });
      });

    return function() { if (abortRef.current) abortRef.current.abort(); };
  }, [sheetName]);

  return state;
}

/* ── ErrorBoundary ───────────────────────────────────────────────────── */
class ErrorBoundary extends Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(err) { return { error: err }; }
  render() {
    if (this.state.error) {
      return (
        <div className="err-page">
          <div style={{ fontSize:32, color:'var(--red)' }}>⚠</div>
          <div className="err-msg">Error en el componente</div>
          <div className="err-sub">{String(this.state.error)}</div>
          <div className="err-sub" style={{ marginTop:8 }}>Abre DevTools (F12) para más detalles.</div>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ── GrowthBadge ─────────────────────────────────────────────────────── */
function GrowthBadge({ current, previous, invert }) {
  const pct = pctChange(current, previous);
  if (pct === null) return null;
  const better = invert ? pct < 0 : pct > 0;
  const worse  = invert ? pct > 0 : pct < 0;
  const cls = better ? 'gbadge gbadge-pos' : worse ? 'gbadge gbadge-neg' : 'gbadge gbadge-neu';
  const arrow = pct > 0.05 ? '↑' : pct < -0.05 ? '↓' : '→';
  return <span className={cls}>{arrow} {Math.abs(pct).toFixed(1)}%</span>;
}

/* ── KPICard ─────────────────────────────────────────────────────────── */
function KPICard({ label, value, prev, format, invert, color, delay }) {
  const fmtV = function(v) {
    if (v == null) return '—';
    if (format === 'eur') return fmt.eur(v);
    if (format === 'pct') return fmt.pct(v);
    if (format === 'dur') return fmt.dur(v);
    return fmt.num(v);
  };
  return (
    <div className="kpi-card fade-up" style={{ animationDelay: (delay || 0) + 'ms' }}>
      <div className="kpi-accent" style={{ background: color }} />
      <div className="kpi-label">{label}</div>
      <div className="kpi-value" style={{ color }}>{fmtV(value)}</div>
      <div className="kpi-footer">
        <GrowthBadge current={value} previous={prev} invert={invert} />
        {prev != null && <span className="kpi-prev">vs {fmtV(prev)}</span>}
      </div>
    </div>
  );
}

/* ── ConversionFunnel ────────────────────────────────────────────────── */
function ConversionFunnel({ data, color }) {
  if (!data) return <div className="empty">Sin datos de conversión</div>;
  const steps = [
    { label: 'Leads Totales', value: data.leadsTotales },
    { label: 'Info Enviada',  value: data.infoEnviada  },
    { label: 'Muestras',      value: data.muestras     },
    { label: 'Convertidos',   value: data.convertidos  },
  ];
  const base = fmt.n(steps[0].value) || 1;

  function hexAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  return (
    <div className="funnel">
      {steps.map(function(s, i) {
        const val   = fmt.n(s.value);
        const width = Math.max(8, (val / base) * 100);
        const bg    = hexAlpha(color, 1 - i * 0.17);
        const rate  = i > 0 && base > 0 ? (val / base * 100).toFixed(1) : null;
        return (
          <div key={i} className="funnel-step fade-up" style={{ animationDelay: (i * 70) + 'ms' }}>
            <div className="funnel-bar-wrap">
              <div className="funnel-fill" style={{ width: width + '%', background: bg }} />
              <span className="funnel-lbl">{s.label}</span>
              <span className="funnel-val">{fmt.num(s.value)}</span>
            </div>
            {rate !== null && <div className="funnel-rate">{rate}% sobre leads totales</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ── LeadQuality ─────────────────────────────────────────────────────── */
function LeadQuality({ data }) {
  if (!data) return <div className="empty">Sin datos de calidad</div>;
  const items = [
    { label:'Caliente',      value: data.caliente,     color:'#e05a5a' },
    { label:'Viable',        value: data.viable,       color:'#4caf85' },
    { label:'Exploratorio',  value: data.exploratorio, color:'#f0a040' },
    { label:'No viable',     value: data.noViable,     color:'#6b6b84' },
  ];
  const max = Math.max.apply(null, items.map(function(i) { return fmt.n(i.value); }).concat([1]));
  return (
    <div className="qlty-rows">
      {items.map(function(it) {
        return (
          <div key={it.label} className="qlty-row">
            <div className="qlty-lbl">{it.label}</div>
            <div className="qlty-track">
              <div className="qlty-fill" style={{ width: (fmt.n(it.value) / max * 100) + '%', background: it.color }} />
            </div>
            <div className="qlty-num" style={{ color: it.color }}>{fmt.num(it.value)}</div>
          </div>
        );
      })}
    </div>
  );
}

/* ── CampaignBreakdown ───────────────────────────────────────────────── */
function CampaignBreakdown({ campaigns, color }) {
  if (!campaigns || !campaigns.length)
    return <div className="empty">No hay datos de campaña para este mes</div>;

  const totInv   = campaigns.reduce(function(s,c) { return s + fmt.n(c.inversion); }, 0);
  const totClics = campaigns.reduce(function(s,c) { return s + fmt.n(c.clicsAds); }, 0);

  return (
    <div style={{ overflowX:'auto' }}>
      <table className="camp-tbl">
        <thead>
          <tr>
            <th>Campaña</th><th>Clics</th><th>CTR</th>
            <th>CPC</th><th>Inversión</th><th>Conv.</th><th>CPL</th>
          </tr>
        </thead>
        <tbody>
          {campaigns.map(function(c, i) {
            return (
              <tr key={i}>
                <td><span className="camp-dot" style={{ background: color }} />{c.campaña}</td>
                <td className="nf">{fmt.num(c.clicsAds)}</td>
                <td className="nf">{fmt.pct(c.ctr)}</td>
                <td className="nf">{fmt.eur(c.cpcMedio)}</td>
                <td className="nf" style={{ color, fontWeight:700 }}>{fmt.eur(c.inversion)}</td>

          {campaigns.length > 1 && (
            <tr style={{ borderTop:'1px solid var(--border)' }}>
              <td style={{ color:'var(--text-dim)', fontWeight:600, fontSize:11 }}>TOTAL</td>
              <td className="nf" style={{ fontWeight:600 }}>{fmt.num(totClics)}</td>
              <td>—</td><td>—</td>
              <td className="nf" style={{ color, fontWeight:700 }}>{fmt.eur(totInv)}</td>

/* ── ChartTooltip ────────────────────────────────────────────────────── */

/* ── HistoryCharts ───────────────────────────────────────────────────── */

    return {

/* ── AIAnalysis ──────────────────────────────────────────────────────── */
function AIAnalysis({ monthsData, month, marketLabel }) {
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const [apiKey,  setApiKey]  = useState('');
  const abortRef = useRef(null);

  function buildPrompt() {
    if (!monthsData || !month) return '';
    const g  = monthsData.get(month);
    const t  = g ? g.total : null;
    const cs = g ? g.campaigns : [];
    const campTxt = cs.length
      ? '\nCAMPAÑAS:\n' + cs.map(function(c) {
          return '  • ' + c.campaña + ': ' + fmt.num(c.clicsAds) + ' clics, CTR ' +
            fmt.pct(c.ctr) + ', inversión ' + fmt.eur(c.inversion) + ', CPL ' + fmt.eur(c.cpl);
        }).join('\n')
      : '';
    return 'Eres analista de marketing digital para Natu Laboratories (sector farmacéutico).\n' +
      'Analiza los KPIs del mercado ' + marketLabel + ' en ' + month + ' y genera 3-4 observaciones accionables en español.\n' +
      'Usa datos concretos. Evita frases genéricas.\n\nDATOS:\n' +
      '— Sesiones: ' + fmt.num(t ? t.sesiones : null) +
      ' | Usuarios: ' + fmt.num(t ? t.usuarios : null) +
      ' | Rebote: ' + fmt.pct(t ? t.tasaRebote : null) +
      ' | Duración: ' + fmt.dur(t ? t.duracion : null) + '\n' +
      '— Leads: ' + fmt.num(t ? t.leadsTotales : null) +
      ' | Info enviada: ' + fmt.num(t ? t.infoEnviada : null) +
      ' | Muestras: ' + fmt.num(t ? t.muestras : null) +
      ' | Convertidos: ' + fmt.num(t ? t.convertidos : null) + '\n' +
      '— Caliente: ' + fmt.num(t ? t.caliente : null) +
      ' | Viable: ' + fmt.num(t ? t.viable : null) +
      ' | Exploratorio: ' + fmt.num(t ? t.exploratorio : null) +
      ' | No viable: ' + fmt.num(t ? t.noViable : null) +
      campTxt +
      '\n\nResponde SOLO con observaciones numeradas (1. 2. 3. …).';
  }

  async function run() {
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    setLoading(true); setError(null); setResult(null);
    try {
      const headers = { 'Content-Type':'application/json', 'anthropic-version':'2023-06-01' };
      if (apiKey.trim()) headers['x-api-key'] = apiKey.trim();

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers,
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 700,
          messages: [{ role:'user', content: buildPrompt() }],
        }),
        signal: abortRef.current.signal,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error((err.error && err.error.message) || 'HTTP ' + res.status);
      }
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text) || '';
      const obs  = text.split(/\n(?=\d+[\.\-]\s)/)
        .map(function(s) { return s.replace(/^\d+[\.\-]\s*/, '').trim(); })
        .filter(Boolean);
      setResult(obs);
    } catch(err) {
      if (err.name !== 'AbortError') setError(err.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="ai-card">
      <div className="ai-hdr">
        <div className="ai-hdr-left">
          <span style={{ color:'var(--gold)', fontSize:17 }}>✦</span>
          <span className="ai-hdr-title">Análisis IA</span>
          <span className="ai-badge">Claude</span>
        </div>
        <div style={{ display:'flex', gap:9, alignItems:'center', flexWrap:'wrap' }}>
          <input
            className="ai-key-input"
            type="password"
            placeholder="API key (opcional si usas proxy)"
            value={apiKey}
            onChange={function(e) { setApiKey(e.target.value); }}
          />
          <button className="btn btn-gold" onClick={run} disabled={loading || !month}>
            {loading ? <><span className="spinner" /> Analizando…</> : '▶ Generar análisis'}
          </button>
        </div>
      </div>

      {error && (
        <div style={{ padding:'11px 13px', borderRadius:8, marginBottom:12, background:'rgba(224,90,90,.1)', color:'#e05a5a', fontSize:13 }}>
          ⚠ {error} — Introduce una API key válida o usa el proxy de Claude.ai.
        </div>
      )}
      {loading && !result && (
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {[0,1,2].map(function(i) {
            return <div key={i} className="skeleton" style={{ height:58, animationDelay:(i*.15)+'s' }} />;
          })}
        </div>
      )}
      {result && (
        <div className="ai-obs-list fade-in">
          {result.map(function(obs, i) {
            return (
              <div key={i} className="ai-obs">
                <div className="ai-obs-n">{i+1}</div>
                <div className="ai-obs-txt">{obs}</div>
              </div>
            );
          })}
        </div>
      )}
      {!loading && !result && !error && (
        <div className="empty" style={{ padding:'16px 0 0' }}>
          Pulsa "Generar análisis" para obtener observaciones sobre los KPIs del mes seleccionado.
        </div>
      )}
    </div>
  );
}

/* ── MarketDashboard ─────────────────────────────────────────────────── */
function MarketDashboard({ market }) {
  const { data, loading, error } = useSheetData(market.sheet);
  const months = useMemo(function() { return data ? Array.from(data.keys()) : []; }, [data]);
  const [selMonth, setSelMonth] = useState(null);

  useEffect(function() {
    if (months.length) setSelMonth(months[months.length - 1]);
  }, [months]);

  const curGroup  = useMemo(function() { return (data && selMonth) ? data.get(selMonth) : null;  }, [data, selMonth]);
  const prevKey   = useMemo(function() {
    if (!months.length || !selMonth) return null;
    const i = months.indexOf(selMonth);
    return i > 0 ? months[i-1] : null;
  }, [months, selMonth]);
  const prevGroup = useMemo(function() { return (data && prevKey) ? data.get(prevKey) : null; }, [data, prevKey]);

  const cur  = curGroup  ? curGroup.total  : null;
  const prev = prevGroup ? prevGroup.total : null;
  const campaigns     = curGroup  ? curGroup.campaigns  : [];
  const prevCampaigns = prevGroup ? prevGroup.campaigns : [];

  const totInv     = campaigns.reduce(function(s,c)     { return s + fmt.n(c.inversion); }, 0) || fmt.n(cur     ? cur.inversion     : null);
  const prevTotInv = prevCampaigns.reduce(function(s,c) { return s + fmt.n(c.inversion); }, 0) || fmt.n(prev    ? prev.inversion    : null);
  const totClics   = campaigns.reduce(function(s,c)     { return s + fmt.n(c.clicsAds); }, 0)  || fmt.n(cur     ? cur.clicsAds     : null);
  const prevTotClics=prevCampaigns.reduce(function(s,c) { return s + fmt.n(c.clicsAds); }, 0)  || fmt.n(prev    ? prev.clicsAds    : null);

  const mailHref = useMemo(function() {
    if (!cur) return '#';
    const body = [
      'KPI Dashboard — Natu Laboratories · ' + market.label + ' · ' + selMonth,
      '', '== TRÁFICO ==',
      'Sesiones: '      + fmt.num(cur.sesiones),
      'Usuarios: '      + fmt.num(cur.usuarios),
      'Tasa rebote: '   + fmt.pct(cur.tasaRebote),
      'Duración: '      + fmt.dur(cur.duracion),
      '', '== CONVERSIÓN ==',
      'Leads totales: ' + fmt.num(cur.leadsTotales),
      'Info enviada: '  + fmt.num(cur.infoEnviada),
      'Muestras: '      + fmt.num(cur.muestras),
      'Convertidos: '   + fmt.num(cur.convertidos),
      '', '== ADS ==',
      'Inversión: '     + fmt.eur(totInv || null),
      'Clics: '         + fmt.num(totClics || null),
      'CPC medio: '     + fmt.eur(cur.cpcMedio),
    ].join('\n');
    return 'mailto:?subject=' + encodeURIComponent('KPI ' + market.label + ' · ' + selMonth) +
      '&body=' + encodeURIComponent(body);
  }, [cur, market.label, selMonth, totInv, totClics]);

  const c = market.color;

  if (loading) return (
    <div className="loading-page">
      <div className="spinner spinner-lg" style={{ borderTopColor: c }} />
      <div className="loading-txt">Cargando {market.label}…</div>
    </div>
  );

  if (error) return (
    <div className="err-page">
      <div style={{ fontSize:32, color:'var(--red)' }}>⚠</div>
      <div className="err-msg">Error al cargar datos</div>
      <div className="err-sub">{error}</div>
      <div className="err-sub" style={{ marginTop:8 }}>
        Verifica que la hoja "{market.sheet}" esté compartida públicamente.
      </div>
    </div>
  );

  if (!data || !months.length) return (
    <div className="empty" style={{ paddingTop:60 }}>No hay datos en la hoja "{market.sheet}"</div>
  );

  return (
    <div>
      {/* Month bar */}
      <div className="month-bar">
        <span className="month-lbl">Mes</span>
        {months.map(function(m) {
          const active = selMonth === m;
          return (
            <button
              key={m}
              className={'month-pill' + (active ? ' active' : '')}
              style={active ? { background:c, borderColor:c, color:'#0a0a0f', fontWeight:700 } : {}}
              onClick={function() { setSelMonth(m); }}
            >{m}</button>
          );
        })}
        <div style={{ flex:1 }} />
        <a href={mailHref} className="btn" title="Enviar resumen por email">✉ Enviar resumen</a>
      </div>

      {/* Tráfico */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Tráfico &amp; Comportamiento</div>
          <div className="sec-rule" />
          {selMonth && <div className="sec-sub">{selMonth}</div>}
        </div>
        <div className="kpi-grid">
          <KPICard label="Sesiones GA4"  value={cur ? cur.sesiones   : null} prev={prev ? prev.sesiones   : null} color={c} delay={0}   />
          <KPICard label="Usuarios"       value={cur ? cur.usuarios    : null} prev={prev ? prev.usuarios    : null} color={c} delay={60}  />
          <KPICard label="Tasa de Rebote" value={cur ? cur.tasaRebote : null} prev={prev ? prev.tasaRebote : null} color={c} delay={120} format="pct" invert={true} />
          <KPICard label="Duración Media" value={cur ? cur.duracion   : null} prev={prev ? prev.duracion   : null} color={c} delay={180} format="dur" />
        </div>
      </div>

      {/* Leads */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Leads &amp; Conversión</div>
          <div className="sec-rule" />
        </div>
        <div className="kpi-grid">
          <KPICard label="Leads Totales"  value={cur ? cur.leadsTotales  : null} prev={prev ? prev.leadsTotales  : null} color={c} delay={0}   />
          <KPICard label="Info Enviada"    value={cur ? cur.infoEnviada   : null} prev={prev ? prev.infoEnviada   : null} color={c} delay={60}  />
          <KPICard label="Muestras"        value={cur ? cur.muestras      : null} prev={prev ? prev.muestras      : null} color={c} delay={120} />
          <KPICard label="Convertidos"     value={cur ? cur.convertidos   : null} prev={prev ? prev.convertidos   : null} color={c} delay={180} />
          <KPICard label="Interesados PL"  value={cur ? cur.interesadosPL : null} prev={prev ? prev.interesadosPL : null} color={c} delay={240} />
        </div>
      </div>

      {/* Ads */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Inversión &amp; Ads</div>
          <div className="sec-rule" />
        </div>
        <div className="kpi-grid">
          <KPICard label="Inversión Ads" value={totInv    || null} prev={prevTotInv   || null} color={c} delay={0}   format="eur" />
          <KPICard label="Clics Ads"     value={totClics  || null} prev={prevTotClics || null} color={c} delay={60}  />
          <KPICard label="CPC Medio"     value={cur ? cur.cpcMedio : null} prev={prev ? prev.cpcMedio : null} color={c} delay={120} format="eur" invert={true} />
          <KPICard label="CPL"           value={cur ? cur.cpl      : null} prev={prev ? prev.cpl      : null} color={c} delay={180} format="eur" invert={true} />
        </div>
      </div>

      {/* Funnel + Quality */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Embudo de Conversión</div>
          <div className="sec-rule" />
        </div>
        <div className="two-col" style={{ alignItems:'start' }}>
          <div><ConversionFunnel data={cur} color={c} /></div>
          <div className="chart-card">
            <div className="chart-title">Calidad de Leads</div>
            <LeadQuality data={cur} color={c} />
          </div>
        </div>
      </div>

      {/* Historical */}
      {months.length > 1 && (
        <div className="section">
          <div className="sec-hdr">
            <div className="sec-title">Evolución Histórica</div>
            <div className="sec-rule" />
          </div>
          <HistoryCharts monthsData={data} months={months} color={c} />
        </div>
      )}

      {/* Campaigns */}
      <div className="section">
        <div className="sec-hdr">
          <div className="sec-title">Desglose por Campaña</div>
          <div className="sec-rule" />
        </div>
        <div className="chart-card">
          <CampaignBreakdown campaigns={campaigns} color={c} />
        </div>
      </div>

      {/* AI */}
      <div className="section">
        <AIAnalysis monthsData={data} month={selMonth} marketLabel={market.label} />
      </div>
    </div>
  );
}

          <div className="fade-in">
            <MarketDashboard market={market} />
          </div>
        </ErrorBoundary>
      </main>

      <footer className="footer">
        Natu Laboratories · KPI Dashboard · {new Date().getFullYear()}
      </footer>
    </div>
  );
}

/* ── Mount ───────────────────────────────────────────────────────────── */
try {
  const container = document.getElementById('root');
  ReactDOM.createRoot(container).render(
    React.createElement(ErrorBoundary, null, React.createElement(App, null))
  );
} catch(e) {
  const el = document.getElementById('js-error');
  if (el) { el.style.display = 'block'; el.textContent = 'Error al montar React:\n\n' + e; }
}
</script>
</body>
</html>
